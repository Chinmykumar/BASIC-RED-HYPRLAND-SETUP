general {
    disable_loading_bar = true
    hide_cursor = true
    grace = 1
}

background {
    monitor =
    path = ~/.config/wallpapers/berserk.png
    blur_passes = 2
    blur_size = 6
    brightness = 0.6
}

# 🕒 Gothic Clock
label {
    monitor =
    text = $TIME
    font_family = UnifrakturCook
    font_size = 104
    position = 0, 100
    halign = center
    valign = center
    color = rgba(220,0,0,1)
}

# Date (subtle)
label {
    text = cmd[date +"%A, %d %B %Y]
    font_size = 22
    color = rgba(200,200,200,1)
    position = 0, -60
    halign = center
    valign = center
}

# 🔒 Password Field (Blood Red)
input-field {
    monitor =
    size = 280, 58
    position = 0, -140
    halign = center
    valign = center

    rounding = 14
    outline_thickness = 2

    outer_color = rgba(200,0,0,0.85)
    inner_color = rgba(0,0,0,0.55)
    font_color = rgba(255,255,255,1)
    caret_color = rgba(220,0,0,1)

    placeholder_text = enter fate
    fade_on_empty = true
}

# ✨ Unlock feedback (pseudo animation via color shift)
label {
    monitor =
    text = ⚔
    font_size = 28
    position = 0, -210
    halign = center
    valign = center
    color = rgba(200,0,0,0.6)
}

